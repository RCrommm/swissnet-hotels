name: SwissNet AI Visibility Cron
on:
  schedule:
    - cron: '0 6 * * *'      # Daily at 6am UTC — Google AI scoring
  workflow_dispatch:          # Allow manual trigger from GitHub
jobs:
  general-geneva:
    runs-on: ubuntu-latest
    steps:
      - name: Google AI Score — Geneva
        run: |
          curl -f "https://swissnethotels.com/api/cron/ai-visibility?region=Geneva&force=true"
          echo "✓ Google AI Geneva done"
